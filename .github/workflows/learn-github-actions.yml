name: Run SQL test

on: [push]

jobs:

  runner-job:

    runs-on: ubuntu-latest

    services:
      oracle:
        image: gvenzl/oracle-xe:11-slim
        env:
          ORACLE_RANDOM_PASSWORD: true
        ports:
          - 1521:1521
        options: >-
          --health-cmd "\${ORACLE_BASE}/healthcheck.sh >/dev/null || exit 1"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 10
    steps:
      - uses: actions/checkout@v2
      - run: docker ps -a
